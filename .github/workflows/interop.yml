name: Chrome Interop
permissions:
  contents: read
on: [push, pull_request]

jobs:
  interop:
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        go: [ "1.25.x", "1.26.x" ]
    steps:
    - uses: actions/checkout@v6
    - uses: nanasess/setup-chromedriver@v2
      with:
        chromedriver-version: '142.0.7444.162'
    - uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go }}
    - name: Build interop server
      run: go build -o interopserver interop_chrome/main.go
    - uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    - name: Install Python dependencies
      run: pip install -r interop_chrome/requirements.txt
    - name: Run interop tests
      run: |
        ./interopserver &
        timeout 120 python interop_chrome/interop.py
